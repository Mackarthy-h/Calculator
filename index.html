<style>
body {
    background:#050505;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    overflow: hidden;
}

/* WELCOME ANIMATION - LOCKED TO CENTER */
#welcome-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    z-index: 9999; /* Controlled by JS */
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: #0f0; 
    font-family: 'Courier New', monospace;
    text-align: center;
}

.scanline {
    width: 100%;
    height: 2px;
    background: rgba(0, 255, 0, 0.1);
    position: absolute;
    animation: scan 4s linear infinite;
}

@keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
}

.typewriter {
    overflow: hidden;
    border-right: .15em solid #0f0;
    white-space: nowrap;
    letter-spacing: .15em;
    font-size: 20px;
    text-transform: uppercase;
    margin: 0 auto; /* Keeps it centered during expansion */
    width: 0; 
}

@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink-caret {
    from, to { border-color: transparent }
    50% { border-color: #0f0 }
}

/* CALC */
#calc-wrap {
    width:640px;
    background:#121212;
    padding:20px;
    border-radius:40px;
}

#display {
    width:100%;
    font-size:40px;
    background:transparent;
    color:white;
    border:none;
    text-align:right;
}

.grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button {
    height:45px;
    border:none;
    background:#1e1e1e;
    color:white;
    border-radius:5px;
}

/* CHAT */
#secret-chat {
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    flex-direction:column;
    z-index: 1000;
}

.chat-header {
    display:flex;
    justify-content:space-between;
    padding:10px;
    color:lavender;
    font-weight: bold;
    font-size: 20px;
}

.exit-btn {cursor:pointer; color:red;}

#messages {
    flex:1;
    overflow:auto;
    padding:10px;
}

.msg {
    padding:8px;
    margin:5px;
    border-radius:12px;
    max-width:70%;
}

.sent {
    background:#1e1e1e;
    margin-left:auto;
    cursor:pointer;
}

.received {
    background:#1a1a1a;
    margin-right:auto;
}

.name {
    font-size:13px;
    color:#859eff;
}

.time {
    font-size:10px;
    color:#aaa;
    text-align:right;
}

.date-label {
    text-align:center;
    color:#777;
    font-size:11px;
    margin:10px 0;
}

#typing {
    font-size:12px;
    color:#888;
    padding-left:10px;
}

/* INPUT */
.input-container { padding:10px; }

.input-bar {
    display:flex;
    background:#111;
    border-radius:20px;
    padding:8px;
}

#msg-input {
    flex:1;
    background:none;
    border:none;
    color:white;
    outline:none;
}

.send-btn {
    background:white;
    color:black;
    border-radius:50%;
    width:35px;
    border:none;
}

/* EMOJI */
#emoji-panel {
    display:none;
    max-height:120px;
    overflow:auto;
    background:#111;
    margin-bottom:5px;
}

#emoji-panel.show {
    display:block;
}

.emoji-grid {
    display:grid;
    grid-template-columns:repeat(8,1fr);
    font-size:20px;
    gap:5px;
    cursor:pointer;
}
</style>
</head>

window.toggleRecording = async () => {

        document.getElementById("voice-audio");

    mimeType: "audio/webm"
});

        audioChunks = [];

        mediaRecorder.ondataavailable = e => {
            audioChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {

            recordedBlob =
                new Blob(audioChunks, {
                    type: "audio/webm"
                });

            audio.src =
                URL.createObjectURL(recordedBlob);

            audio.style.display = "block";

            status.innerHTML =
    "🎧 Preview Voice Message";

            clearInterval(recordingInterval);
        };

        mediaRecorder.start();

        isRecording = true;

        preview.style.display = "block";

        micBtn.innerText = "⏹";

        recordingSeconds = 0;

        timer.innerText = "0s";

        recordingInterval = setInterval(() => {

            recordingSeconds++;

            timer.innerText =
                recordingSeconds + "s";

        statusDiv.innerText = "offline";
        return;
    }

    // REAL online check
    if (
        otherUser.online &&
        otherUser.last_seen > fiveSecondsAgo
    ) {

        statusDiv.innerText = "online";

    } else {

        const lastSeen =
            new Date(otherUser.last_seen)
            .toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });

        statusDiv.innerText =
            `last seen ${lastSeen}`;
    }

}
setInterval(() => {

    checkOnlineUsers();

}, 5000);
onlineInterval = setInterval(() => {

    updateOnlineStatus(true);

}, 15000);

document.addEventListener("visibilitychange", () => {

    if (document.visibilityState === "hidden") {

        updateOnlineStatus(false);

    } else {

        updateOnlineStatus(true);

    }

});
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js")
        .then(() => console.log("SW registered"));
}
</script>
